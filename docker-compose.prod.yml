# Quran API Go - Production Docker Compose
# =========================================
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# This production override adds:
# - Resource limits
# - Restart policy
# - Logging configuration
# - Health check
# - Volume mount for DB persistence

services:
  api:
    # Restart policy
    restart: unless-stopped

    # Production environment
    env_file:
      - .env.production

    # Environment variables
    environment:
      - DB_PATH=/app/data/quran.db
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - APP_VERSION=1.0.0
      - LOG_LEVEL=info

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

    # Logging - JSON format for log aggregation
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        compress: "true"

    # Health check
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # Volume mount for DB persistence
    volumes:
      - quran-data:/app/data

    # Network mode
    networks:
      - coolify

networks:
  coolify:
    external: true
