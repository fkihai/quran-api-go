services:
  api:
    build: .
    expose:
      - "8080"
    environment:
      - DB_PATH=/app/data/quran.db
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - GIN_MODE=release
      - APP_VERSION=1.0.0
      - LOG_LEVEL=info
    volumes:
      - quran-data:/app/data
    restart: unless-stopped
    networks:
      - coolify

networks:
  coolify:
    external: true

volumes:
  quran-data:
    driver: local