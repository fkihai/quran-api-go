# Quran API Go - Nginx Reverse Proxy Configuration
# ================================================

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;

# Upstream block
upstream quran_api_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

