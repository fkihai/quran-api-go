# HTTP server (without SSL - for testing/development)
server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain application/json application/javascript text/css text/xml text/javascript;

    # Request logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/quran-api-access.log main;
    error_log /var/log/nginx/quran-api-error.log warn;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Rate limiting
    limit_req zone=api_limit burst=200 nodelay;

    # Proxy settings
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Buffering
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;

    # Health check endpoint - no rate limiting
    location /health {
        proxy_pass http://quran_api_backend;
        limit_req zone=api_limit burst=50 nodelay;
    }

    # API endpoints
    location / {
        proxy_pass http://quran_api_backend;
    }

    # Static content caching (docs, assets)
    location ~* \.(txt|md)$ {
        proxy_pass http://quran_api_backend;
        expires 1h;
        add_header Cache-Control "public, immutable";
    }
}
